# ============================================================
# SuperBizAgent - Nginx 生产环境反向代理配置
# 使用方式：
#   1. 申请 SSL 证书前先用 HTTP 模式
#   2. 证书到位后取消注释 SSL 部分
# ============================================================

upstream super_biz_api {
    server app:9900 max_fails=3 fail_timeout=10s;
}

# HTTP → HTTPS 跳转（证书就绪后启用）
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

# HTTPS 服务（证书就绪后启用）
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
#     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;

# 先用 HTTP（方便首次部署验证）
server {
    listen 80;
    server_name _;  # 部署时改为 your-domain.com

    client_max_body_size 50M;

    # 健康检查（给云负载均衡用）
    location /health {
        proxy_pass http://super_biz_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态文件（前端页面、CSS、JS）
    location /static/ {
        proxy_pass http://super_biz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 302 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # API 路由（普通请求）
    location /api/ {
        proxy_pass http://super_biz_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SSE 流式输出（chat_stream / aiops 必须关闭缓冲）
    location /api/chat_stream {
        proxy_pass http://super_biz_api/api/chat_stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /api/aiops {
        proxy_pass http://super_biz_api/api/aiops;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # 首页
    location / {
        proxy_pass http://super_biz_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
